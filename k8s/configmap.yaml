apiVersion: v1
kind: ConfigMap
metadata:
  name: ms-appointment-config
  namespace: hospital
  labels:
    app: ms-appointment
data:
  # ── Servidor ──────────────────────────────────────────────────────────────
  SERVER_PORT: "8082"

  # ── URLs internas del cluster (DNS de K8s: <service>.<namespace>.svc.cluster.local)
  # Forma corta (válida dentro del mismo namespace "hospital"):
  MS_USER_URL: "http://ms-user-service:8081"
  MS_AUTH_URL: "http://ms-auth-service:8080"

  # ── JPA / Hibernate ────────────────────────────────────────────────────────
  SPRING_JPA_SHOW_SQL:                   "false"
  SPRING_JPA_HIBERNATE_DDL_AUTO:         "none"

  # ── Flyway ─────────────────────────────────────────────────────────────────
  SPRING_FLYWAY_ENABLED:                 "true"
  SPRING_FLYWAY_BASELINE_ON_MIGRATE:     "true"
