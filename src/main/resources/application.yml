server:
  port: 8082

spring:
  application:
    name: ms-appointment

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

ms-user:
  base-url: ${MS_USER_URL}

ms-auth:
  base-url: ${MS_AUTH_URL}

logging:
  level:
    com.hospital.msappointment: DEBUG
    org.flywaydb: INFO
